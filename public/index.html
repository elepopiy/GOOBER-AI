<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.O.O.B.E.R - Cyberpunk AI Engine Panel</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { background: #08090c; color: #00f0ff; height: 100vh; overflow: hidden; display: flex; }
        
        /* AUTH SECTION */
        #auth-container { position: fixed; inset: 0; background: rgba(5,7,12,0.95); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #0f131d; border: 2px solid #00f0ff; box-shadow: 0 0 20px rgba(0,240,255,0.3); padding: 40px; border-radius: 12px; width: 360px; text-align: center; }
        .auth-box h2 { font-family: 'Orbitron', sans-serif; color: #ff0055; margin-bottom: 20px; text-shadow: 0 0 10px #ff0055; }
        .auth-box input { width: 100%; margin: 10px 0; padding: 12px; background: #080a10; border: 1px solid #00f0ff; color: #fff; border-radius: 6px; outline: none; }
        .auth-box button { width: 100%; padding: 12px; margin-top: 10px; background: #00f0ff; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 6px; font-family: 'Orbitron'; transition: 0.2s; }
        .auth-box button:hover { background: #ff0055; color: #fff; box-shadow: 0 0 15px #ff0055; }

        /* MAIN PANEL UI */
        #app { display: flex; width: 100vw; height: 100vh; }
        .sidebar { width: 300px; background: #0b0e14; border-right: 1px solid #1a2332; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .brand { font-family: 'Orbitron'; font-size: 20px; color: #ff0055; text-shadow: 0 0 8px #ff0055; text-align: center; margin-bottom: 10px; }
        
        .main-panel { flex: 1; display: grid; grid-template-rows: 70px 1fr 220px; gap: 12px; padding: 15px; background: #05070c; }
        .top-bar { background: #0d121d; border: 1px solid #1e293b; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }
        .card { background: #0c1017; border: 1px solid #192231; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card h3 { font-family: 'Orbitron'; font-size: 14px; color: #38bdf8; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

        /* CANLI EKRAN & TELEMETRİ */
        .viewport-box { background: #020305; border: 1px dashed #00f0ff; height: 100%; border-radius: 6px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: monospace; }
        .radar-grid { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,240,255,0.05) 0%, transparent 70%); pointer-events: none; }
        .telemetry-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); border: 1px solid #38bdf8; padding: 5px 10px; font-size: 12px; border-radius: 4px; color: #a5f3fc; }

        /* CHAT BOX */
        .chat-box { flex: 1; overflow-y: auto; background: #030508; border: 1px solid #111827; padding: 10px; font-family: monospace; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
        .chat-msg { margin-bottom: 4px; }
        .chat-msg b { color: #ff0055; }

        /* PLAYER LIST */
        .player-list { overflow-y: auto; max-height: 100%; }
        .player-item { display: flex; align-items: center; gap: 10px; padding: 6px; border-bottom: 1px solid #111827; font-size: 14px; }
        .player-item img { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #00f0ff; }

        /* CONTROLS & HOTBAR */
        .hotbar { display: flex; gap: 6px; justify-content: center; background: #080b11; padding: 8px; border-radius: 6px; border: 1px solid #1e293b; }
        .slot { width: 48px; height: 48px; background: #0f172a; border: 2px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; font-weight: bold; position: relative; color: #f8fafc; border-radius: 4px; }
        .slot.active { border-color: #00f0ff; box-shadow: 0 0 10px #00f0ff; }
        .slot .count { position: absolute; bottom: 2px; right: 4px; color: #facc15; font-size: 11px; }

        .btn { background: #0f172a; border: 1px solid #38bdf8; color: #38bdf8; padding: 8px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: 'Orbitron'; transition: 0.2s; text-align: center; }
        .btn:hover { background: #38bdf8; color: #000; box-shadow: 0 0 10px #38bdf8; }
        .btn-danger { border-color: #ef4444; color: #ef4444; }
        .btn-danger:hover { background: #ef4444; color: #fff; box-shadow: 0 0 10px #ef4444; }
        .btn-success { border-color: #22c55e; color: #22c55e; }
        .btn-success:hover { background: #22c55e; color: #000; box-shadow: 0 0 10px #22c55e; }

        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #334155; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #00f0ff; }
        input:checked + .slider:before { transform: translateX(22px); }

        input, select { background: #080a10; border: 1px solid #1e293b; color: #fff; padding: 8px; border-radius: 4px; outline: none; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-box">
        <h2>G.O.O.B.E.R v2.0</h2>
        <input type="text" id="auth-user" placeholder="Operatör Adı">
        <input type="password" id="auth-pass" placeholder="Şifre">
        <button onclick="login()">SİSTEME GİRİŞ YAP</button>
        <button onclick="register()" style="background:transparent; border:1px solid #ff0055; color:#ff0055; margin-top:5px;">YENİ OPERATÖR KAYDI</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="sidebar">
        <div class="brand">G.O.O.B.E.R AI</div>
        <button class="btn btn-success" onclick="createBot()">+ YENİ BOT OLUŞTUR</button>
        <div id="bot-list" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>

    <div class="main-panel">
        <div class="top-bar">
            <div>
                <h2 id="active-bot-title" style="font-family:'Orbitron'; color:#00f0ff;">BOT SEÇİLMEDİ</h2>
                <span id="bot-status-badge" style="font-size:12px; color:#94a3b8;">Sistem Beklemede</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-success" onclick="startBot()">SUNUCUYA BAĞLAN</button>
                <button class="btn btn-danger" onclick="stopBot()">BAĞLANTIYI KES</button>
            </div>
        </div>

        <div class="content-grid">
            <!-- CANLI VIRTUAL EKRAN / RADAR -->
            <div class="card">
                <h3>CANLI SİMÜLASYON & TELEMETRİ</h3>
                <div class="viewport-box">
                    <div class="radar-grid"></div>
                    <div class="telemetry-tag" id="telemetry-data">X: 0.0 | Y: 0.0 | Z: 0.0<br>Sağlık: 20 | Açlık: 20</div>
                    <div style="text-align:center; z-index:2;">
                        <div style="font-size:40px;">🤖</div>
                        <div id="bot-live-action" style="color:#00f0ff; font-family:'Orbitron'; font-size:12px;">HAREKET BEKLENİYOR</div>
                    </div>
                </div>
            </div>

            <!-- CHAT & SOHBET -->
            <div class="card">
                <h3>SOHBET & OYUN LOGLARI</h3>
                <div class="chat-box" id="chat-log"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chat-input" placeholder="Oyun içi mesaj..." style="flex:1;">
                    <button class="btn" onclick="sendChat()">GÖNDER</button>
                </div>
            </div>

            <!-- OYUNCU LİSTESİ -->
            <div class="card">
                <h3>SUNUCUDAKİLER (A-Z)</h3>
                <div class="player-list" id="player-list"></div>
            </div>
        </div>

        <!-- ALT DÜZENLEME & KONTROL PANELİ -->
        <div class="card" style="display:grid; grid-template-columns: 1fr 1fr 1.2fr; gap:15px; align-items:center;">
            <!-- DİNAMİK SUNUCU & AI AYARLARI -->
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-family:'Orbitron'; font-size:12px; color:#38bdf8;">YAPAY ZEKA MODU</span>
                    <label class="switch">
                        <input type="checkbox" id="ai-toggle" onchange="updateBotSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
                <input type="text" id="cfg-host" placeholder="Sunucu IP (Örn: localhost)" style="font-size:12px;">
                <input type="number" id="cfg-port" placeholder="Port (Örn: 25565)" style="font-size:12px;">
                <input type="password" id="cfg-apikey" placeholder="Groq API Key (gsk_...)" style="font-size:12px;">
                <button class="btn" onclick="updateBotSettings()" style="font-size:10px;">AYARLARI KAYDET</button>
            </div>

            <!-- AI ÖZEL KOMUT MERKEZİ -->
            <div style="display:flex; flex-direction:column; gap:8px; border-left:1px solid #1e293b; padding-left:15px;">
                <span style="font-family:'Orbitron'; font-size:12px; color:#ff0055;">YAPAY ZEKAYA DİREKT EMİR VER</span>
                <textarea id="ai-command-input" placeholder="Örn: 'Git en yakındaki ağacı kes' veya 'Beni takip et'" style="height:65px; background:#080a10; border:1px solid #1e293b; color:#fff; padding:6px; border-radius:4px; font-size:12px; resize:none;"></textarea>
                <button class="btn" onclick="sendAICommand()" style="border-color:#ff0055; color:#ff0055;">EMRİ İLET</button>
            </div>

            <!-- ENVANTER & MANUEL KONTROLLER -->
            <div style="display:flex; flex-direction:column; gap:8px; border-left:1px solid #1e293b; padding-left:15px;">
                <span style="font-family:'Orbitron'; font-size:12px; color:#38bdf8;">ENVANTER & MANUEL MANEVRA</span>
                <div class="hotbar" id="hotbar"></div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:grid; grid-template-columns: repeat(3, 30px); gap:3px;">
                        <div></div><div class="btn" style="padding:4px;" onmousedown="setMove('forward', true)" onmouseup="setMove('forward', false)">W</div><div></div>
                        <div class="btn" style="padding:4px;" onmousedown="setMove('left', true)" onmouseup="setMove('left', false)">A</div>
                        <div class="btn" style="padding:4px;" onmousedown="setMove('back', true)" onmouseup="setMove('back', false)">S</div>
                        <div class="btn" style="padding:4px;" onmousedown="setMove('right', true)" onmouseup="setMove('right', false)">D</div>
                    </div>
                    <div style="display:flex; gap:4px;">
                        <button class="btn" style="font-size:10px;" onclick="triggerAction('leftClick')">SOL TIK</button>
                        <button class="btn" style="font-size:10px;" onclick="triggerAction('rightClick')">SAĞ TIK</button>
                        <button class="btn btn-danger" style="font-size:10px;" onclick="triggerAction('drop')">AT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let token = '';
    let socket = io();
    let selectedBot = null;

    async function register() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        alert(data.message || data.error);
    }

    async function login() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.token) {
            token = data.token;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadBots();
        } else alert(data.error);
    }

    async function loadBots() {
        const res = await fetch('/api/bots', { headers: { 'Authorization': 'Bearer ' + token } });
        const bots = await res.json();
        const list = document.getElementById('bot-list');
        list.innerHTML = '';
        bots.forEach(b => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.width = '100%';
            btn.style.textAlign = 'left';
            btn.innerText = `> ${b.name} [${b.online ? 'ONLINE' : 'OFFLINE'}]`;
            btn.onclick = () => selectBot(b);
            list.appendChild(btn);
        });
    }

    async function createBot() {
        const name = prompt("Bot İsmi:");
        const username = prompt("Minecraft Kullanıcı Adı:");
        const apiKey = prompt("Groq API Key (İsteğe Bağlı):");
        if (!name || !username) return;

        await fetch('/api/bots', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ name, username, apiKey, host: 'localhost', port: 25565, aiEnabled: true })
        });
        loadBots();
    }

    function selectBot(bot) {
        selectedBot = bot;
        document.getElementById('active-bot-title').innerText = bot.name.toUpperCase();
        document.getElementById('cfg-host').value = bot.host;
        document.getElementById('cfg-port').value = bot.port;
        document.getElementById('cfg-apikey').value = bot.apiKey || '';
        document.getElementById('ai-toggle').checked = bot.aiEnabled;
        document.getElementById('chat-log').innerHTML = '';

        socket.emit('joinBotRoom', { botId: bot.id, token });
    }

    async function updateBotSettings() {
        if (!selectedBot) return;
        const host = document.getElementById('cfg-host').value;
        const port = document.getElementById('cfg-port').value;
        const apiKey = document.getElementById('cfg-apikey').value;
        const aiEnabled = document.getElementById('ai-toggle').checked;

        await fetch(`/api/bots/${selectedBot.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ host, port, apiKey, aiEnabled })
        });
        alert("Bot konfigürasyonu güncellendi!");
        loadBots();
    }

    function startBot() { if (selectedBot) socket.emit('startBot'); }
    function stopBot() { if (selectedBot) socket.emit('stopBot'); }

    function sendAICommand() {
        const input = document.getElementById('ai-command-input');
        if (input.value) {
            socket.emit('directAICommand', input.value);
            input.value = '';
        }
    }

    // TELEMETRİ & CANLI EKRAN
    socket.on('botTelemetry', data => {
        document.getElementById('telemetry-data').innerHTML = 
            `X: ${data.x} | Y: ${data.y} | Z: ${data.z}<br>Sağlık: ${data.health} ❤️ | Açlık: ${data.food} 🍖`;
        document.getElementById('bot-live-action').innerText = `YAW: ${data.yaw} | PITCH: ${data.pitch}`;
    });

    socket.on('status', data => {
        document.getElementById('bot-status-badge').innerText = `Durum: ${data.state.toUpperCase()} - ${data.message || ''}`;
    });

    socket.on('chat', data => {
        const log = document.getElementById('chat-log');
        log.innerHTML += `<div class="chat-msg"><span>[${data.time}]</span> <b>${data.username}:</b> ${data.message}</div>`;
        log.scrollTop = log.scrollHeight;
    });

    socket.on('playerList', players => {
        const list = document.getElementById('player-list');
        list.innerHTML = '';
        players.forEach(p => {
            list.innerHTML += `
                <div class="player-item">
                    <img src="https://crafatar.com/avatars/${p.username}?overlay=true" />
                    <span>${p.username}</span>
                </div>`;
        });
    });

    socket.on('inventory', items => {
        const hotbar = document.getElementById('hotbar');
        hotbar.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const item = items[i];
            hotbar.innerHTML += `
                <div class="slot ${i===0?'active':''}" onclick="socket.emit('selectSlot', ${i})">
                    ${item ? item.name.substring(0, 4) : ''}
                    ${item ? `<span class="count">${item.count}</span>` : ''}
                </div>`;
        }
    });

    function sendChat() {
        const input = document.getElementById('chat-input');
        if (input.value) {
            socket.emit('sendChat', input.value);
            input.value = '';
        }
    }

    function setMove(control, state) { socket.emit('controlState', { control, state }); }
    function triggerAction(type) { socket.emit('action', { type }); }
</script>
</body>
</html>
